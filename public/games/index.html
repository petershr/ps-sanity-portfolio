<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">

    <!-- bootstrap import method borrowed from finance layout.html -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>

    <link href="styles.css" rel="stylesheet">

    <title>Egyptian Wars - Peter Shr</title>

</head>

<body>

    <nav class="bg-dark navbar navbar-expand-md navbar-dark py-3">
        <div class="container-fluid">
            <div class="navbar-brand mx-4 fs-1" href="/"><b>EGYPTIAN WARS!</b></div>
            <div class="navbar-nav ms-auto">
                <a class="navlink mx-3 px-4 fs-4" href="rules.html"><b>RULES</b></a>
                <button class="navlink mx-3 px-4 fs-4 reset border-0"><b>NEW GAME</b></button>
                <div class="dropdown mx-3 border-0">
                    <button class="navlink fs-4 dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <b>DIFFICULTY</b>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item easy"><b>Easy</b></a></li>
                        <li><a class="dropdown-item medium"><b>Medium</b></a></li>
                        <li><a class="dropdown-item hard"><b>Hard</b></a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>


    <main class="i-main">
        <div id="bot-area">
            <img id="bot-card" />
            <p id="bot-count" class="count"></p>
        </div>

        <div id="pot">
            <!--<img id="pot-card" />-->
            <div id="pot-container"></div>
            <button id="slap" class="play-btn">SLAP</button> <!-- option to play with SPACE key -->
        </div>
        <div id="burn-area">
            <img id="burn-pile" />
        </div>
        <div id="ply-area">
            <img id="ply-card" />
            <button id="play" class="play-btn">PLAY</button> <!-- option to play with 'j' key -->
            <p id="ply-count" class="count"></p>
        </div>
        <div id="status"></div>
        <div id="slap-status"></div>
        <div id="win-message"></div>
    </main>


</body>

</html>
